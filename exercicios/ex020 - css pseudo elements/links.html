<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: purple;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: red;
        }

        a:hover {
            color: blue;
        }

        a:active {
            color: green;
        }

        a::before {
            content: '[Antes] ';
            text-decoration: none;
            font-weight: normal;
            color: darkgray;
        }

        a::after {
            content: ' [After]';
            text-decoration: none;
            font-weight: normal;
            color: darkgray;
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="ww.google.com" target="_blank">Item de lista</a></li>
        <li><a href="ww.google.com" target="_blank">Item de lista</a></li>
        <li><a href="ww.google.com" target="_blank">Item de lista</a></li>
        
    </ul>
</body>
</html>

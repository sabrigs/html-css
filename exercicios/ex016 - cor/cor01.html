<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cores</title>
</head>
<body>
    <h1>Formatos</h1>
    <h2>RGB</h2>
    <p style="background-color: rgb(243, 219, 255); color: rgba(0, 0, 0, 0.489);">
        Sample
    </p>
    <h2>Hexadecimal</h2>
    <p style="background-color: #f3dbff; color: rgba(0, 0, 0, 0.489);">
        Sample
    </p>
    <h2>HSL</h2>
    <p style="background-color: hsl(280, 100%, 93%); color: rgba(0, 0, 0, 0.489);">
        Sample
    </p>
    <h2>Nome da cor</h2>
    <p style="background-color: purple; color: rgba(0, 0, 0, 0.489);">
        Sample
    </p>
    <h1>Degradê</h1>
    <p style="background-image: linear-gradient(to left, #B82234, #F36E22);">
        Sample
    </p>
    <p style="background-image: linear-gradient(to right, #B82234, #F36E22);">
        Sample
    </p>
    <p style="background-image: linear-gradient(to bottom, #B82234, #F36E22);">
        Sample
    </p>
    <p style="background-image: linear-gradient(to top, #B82234, #F36E22);">
        Sample
    </p>
    <p style="background-image: radial-gradient(#B82234, #F36E22)">
        Sample
    </p>
</body>
</html>

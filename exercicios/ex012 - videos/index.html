<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <h2>Servidor próprio</h2>
    <p>Este vídeo está hospedado no meu próprio servidor.</p>
    <video width="300px" height="200px" poster="img/thumbnail.png" controls loop>
        <source src="midia/video.mp4" type="video/mp4">
        <source src="midia/video.mkv" type="video/mkv">
        <source src="midia/video.mov" type="video/mov">
        <p>Seu navegador não tem compatibilidade com reprodução de vídeos.</p>
    </video>
    <h2>Youtube</h2>
    <p>Esse vídeo está hospedado no Youtube.</p>
    <iframe width="300" height="200" src="https://www.youtube.com/embed/3hng-hmSv2Y?si=fgerg5Qxmb1CMwxa" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
